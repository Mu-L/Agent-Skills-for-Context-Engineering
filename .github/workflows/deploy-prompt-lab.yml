name: Deploy long-horizon prompt lab

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-prompt-lab.yml"
      - "skills/long-horizon-prompting/**"
      - "researcher/claims/index.jsonl"
      - "examples/long-horizon-prompt-lab/data/**"
      - "examples/long-horizon-prompt-lab/package.json"
      - "examples/long-horizon-prompt-lab/package-lock.json"
      - "examples/long-horizon-prompt-lab/scripts/**"
      - "examples/long-horizon-prompt-lab/screenshots/shot-hero.png"
      - "examples/long-horizon-prompt-lab/ui/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/deploy-prompt-lab.yml"
      - "skills/long-horizon-prompting/**"
      - "researcher/claims/index.jsonl"
      - "examples/long-horizon-prompt-lab/**"
  workflow_dispatch:

concurrency:
  group: long-horizon-prompting-pages
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: examples/long-horizon-prompt-lab/package-lock.json

      - name: Install site tooling
        run: npm ci
        working-directory: examples/long-horizon-prompt-lab

      - name: Build and validate site
        run: |
          npm test
          git diff --exit-code -- \
            data/prompt-pairs.json \
            ui/data.js \
            ui/prompts/
          test -z "$(git status --porcelain --untracked-files=all -- \
            data/prompt-pairs.json ui/data.js ui/prompts/)"
        working-directory: examples/long-horizon-prompt-lab

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp -R examples/long-horizon-prompt-lab/ui/. _site/
          cp examples/long-horizon-prompt-lab/screenshots/shot-hero.png _site/social-card.png
          touch _site/.nojekyll

      - name: Upload site artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: long-horizon-prompting-site
          path: _site
          if-no-files-found: error

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check pages publish token
        id: pages_token
        env:
          LONG_HORIZON_PAGES_TOKEN: ${{ secrets.LONG_HORIZON_PAGES_TOKEN }}
        run: |
          if [ -z "${LONG_HORIZON_PAGES_TOKEN}" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "LONG_HORIZON_PAGES_TOKEN is not set."
            echo "Skipping publish. Create muratcankoylan/long-horizon-prompting and add the secret to enable deploys."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download site artifact
        if: steps.pages_token.outputs.present == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: long-horizon-prompting-site
          path: _site

      - name: Publish to long-horizon-prompting Pages repo
        if: steps.pages_token.outputs.present == 'true'
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          personal_token: ${{ secrets.LONG_HORIZON_PAGES_TOKEN }}
          external_repository: muratcankoylan/long-horizon-prompting
          publish_branch: gh-pages
          publish_dir: _site
          force_orphan: true
          commit_message: Deploy Long-Horizon Prompting site
